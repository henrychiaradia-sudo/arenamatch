# Configuração do Supabase CLI para desenvolvimento local.
# Se a sua versão do CLI reclamar de algum campo, rode `supabase init` uma vez
# para gerar um config.toml compatível e reaproveite as migrações/seed.

project_id = "arenamatch"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Desative confirmações no local para o cadastro logar imediatamente.
enable_confirmations = false
